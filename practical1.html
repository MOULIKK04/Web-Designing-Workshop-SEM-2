<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Largest Number</title>
    <style>
        h2{
            color: rgb(0, 0, 0);
            text-align: center;
        }
        body {
            background-color: rgb(180, 174, 217);
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
        }
        input {
            margin: 20px;
            padding: 10px;
            width: 150px;
        }
        button {
            padding: 10px 20px;
            margin-top: 10px;
            background-color: black;
            color: rgb(255, 255, 255);  
            border: none;
            cursor: pointer;

        }
        #result {
            margin-top: 50px;
            font-size: 50px;
            font-weight: bold;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        }

      
    </style>

</head>
<body>
    <h2>Find the Largest Number</h2>

    <input type="number" id="num1" placeholder="Number 1"><br>
    <input type="number" id="num2" placeholder="Number 2"><br>
    <input type="number" id="num3" placeholder="Number 3"><br>
    <input type="number" id="num4" placeholder="Number 4"><br>
    <input type="number" id="num5" placeholder="Number 5"><br>

    <button onclick="findLargest()">Find Largest</button>

    <div id="result"></div>

    <script>
        function findLargest() {
            let n1 = Number(document.getElementById("num1").value);
            let n2 = Number(document.getElementById("num2").value);
            let n3 = Number(document.getElementById("num3").value);
            let n4 = Number(document.getElementById("num4").value);
            let n5 = Number(document.getElementById("num5").value);

            let largest;

            if (n1 >= n2 && n1 >= n3 && n1 >= n4 && n1 >= n5) {
                largest = n1;
            } else if (n2 >= n1 && n2 >= n3 && n2 >= n4 && n2 >= n5) {
                largest = n2;
            } else if (n3 >= n1 && n3 >= n2 && n3 >= n4 && n3 >= n5) {
                largest = n3;
            } else if (n4 >= n1 && n4 >= n2 && n4 >= n3 && n4 >= n5) {
                largest = n4;
            } else {
                largest = n5;
            }

            document.getElementById("result").innerText =
                "Largest Number is: " + largest;
        }
    </script>
    
</body>
</html>
